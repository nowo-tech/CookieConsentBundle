parameters:

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false
    bind:
      $cookieCategories: '%nowo_cookie_consent.categories%'
      $httpOnly: '%nowo_cookie_consent.http_only%'
      $formAction: '%nowo_cookie_consent.form_action%'
      $csrfProtection: '%nowo_cookie_consent.csrf_protection%'
      $cookieConsentDisabledRoutes: '%nowo_cookie_consent.disabled_routes%'
      $useDatabaseConfig: '%nowo_cookie_consent.use_database_config%'
      $fetchConfigViaApi: '%nowo_cookie_consent.fetch_config_via_api%'
      $uiTheme: '%nowo_cookie_consent.ui_theme%'

  Nowo\CookieConsentBundle\:
    resource: '../../'
    exclude:
      - '../../DependencyInjection/'
      - '../../Entity/'
      - '../../NowoCookieConsentBundle.php'

  # Explicit (not _defaults.bind): survives setClass overrides and avoids unused-bind
  # errors when the FormSubscriber definition is replaced by the host app.
  Nowo\CookieConsentBundle\EventSubscriber\CookieConsentFormSubscriber:
    arguments:
      $useLogger: '%nowo_cookie_consent.use_logger%'

  Nowo\CookieConsentBundle\Locale\LocaleResolver:
    arguments:
      $enabledLocales: '%nowo_cookie_consent.enabled_locales%'
      $defaultLocale: '%nowo_cookie_consent.default_locale%'
      $detectLocaleFromAcceptLanguage: '%nowo_cookie_consent.detect_locale_from_accept_language%'

  Nowo\CookieConsentBundle\Config\CmpUxOptionsResolver:
    arguments:
      $colorTheme: '%nowo_cookie_consent.color_theme%'
      $darkModeEnabled: '%nowo_cookie_consent.dark_mode_enabled%'
      $disableTransitions: '%nowo_cookie_consent.disable_transitions%'
      $disablePageInteraction: '%nowo_cookie_consent.disable_page_interaction%'
      $twoStepModal: '%nowo_cookie_consent.two_step_modal%'
      $openPreferencesModal: '%nowo_cookie_consent.open_preferences_modal%'
      $manageIframePlaceholders: '%nowo_cookie_consent.manage_iframe_placeholders%'
      $granularCookieSelection: '%nowo_cookie_consent.granular_cookie_selection%'
      $preferencesBubbleEnabled: '%nowo_cookie_consent.preferences_bubble_enabled%'
      $preferencesBubblePosition: '%nowo_cookie_consent.preferences_bubble_position%'
      $preferencesBubbleBorderColor: '%nowo_cookie_consent.preferences_bubble_border_color%'
      $preferencesBubbleIcon: '%nowo_cookie_consent.preferences_bubble_icon%'
      $yamlPreferenceSections: '%nowo_cookie_consent.preference_sections%'
      $useDatabaseConfig: '%nowo_cookie_consent.use_database_config%'

  Nowo\CookieConsentBundle\Config\CookieInventoryProvider:
    arguments:
      $useCookieInventory: '%nowo_cookie_consent.use_cookie_inventory%'
      $yamlCookieInventory: '%nowo_cookie_consent.cookie_inventory%'

  Nowo\CookieConsentBundle\Twig\CookieConsentTwigExtension:
    arguments:
      $yamlRouteTargetingMode: '%nowo_cookie_consent.route_targeting_mode%'
      $yamlTargetRoutes: '%nowo_cookie_consent.target_routes%'
      $useDatabaseConfig: '%nowo_cookie_consent.use_database_config%'
      $fetchConfigViaApi: '%nowo_cookie_consent.fetch_config_via_api%'
      $cookieConsentDisabledRoutes: '%nowo_cookie_consent.disabled_routes%'
      $cmpUxOptionsResolver: '@Nowo\CookieConsentBundle\Config\CmpUxOptionsResolver'
      $inventoryProvider: '@Nowo\CookieConsentBundle\Config\CookieInventoryProvider'

  Nowo\CookieConsentBundle\Config\CookieConsentConfigPayloadFactory:
    arguments:
      $categories: '%nowo_cookie_consent.categories%'
      $yamlPreferenceSections: '%nowo_cookie_consent.preference_sections%'
      $disablePageInteraction: '%nowo_cookie_consent.disable_page_interaction%'

  Nowo\CookieConsentBundle\Controller\:
    resource: '../../Controller/'
    public: true

  Nowo\CookieConsentBundle\Entity\CookieConsentLog:
    autowire: false

  nowo_cookie_consent.translation.loader.array:
    class: Symfony\Component\Translation\Loader\ArrayLoader
    tags:
      - { name: translation.loader, alias: array }
