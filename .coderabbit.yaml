# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for nowo-tech/cookie-consent-bundle.
# Requires the CodeRabbit GitHub App installed on nowo-tech/cookie-consent-bundle.
# Manual review: comment `@coderabbitai review` on a pull request.

language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  commit_status: true
  poem: false
  collapse_walkthrough: true
  sequence_diagrams: true
  changed_files_summary: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 10
    drafts: false
    base_branches:
      - main
      - master
    ignore_title_keywords:
      - WIP
      - "[skip review]"

  path_filters:
    - "!**/vendor/**"
    - "!**/coverage/**"
    - "!**/*.lock"
    - "!.cursor/**"
    - "src/**"
    - "tests/**"
    - "docs/**"
    - "demo/**"
    - ".github/**"
    - "*.md"
    - "*.yaml"
    - "*.yml"
    - "Makefile"
    - "vite.config.ts"
    - "package.json"

  path_instructions:
    - path: "src/**/*.php"
      instructions: |
        nowo-tech/cookie-consent-bundle — Symfony bundle for GDPR cookie consent modals with category toggles,
        optional Doctrine logging, and TypeScript frontend assets built with Vite.
        Follow PSR-12 and `.php-cs-fixer.dist.php`. PHPDoc must be in English.
        Preserve backward compatibility for config keys, routes, Twig functions, and cookie names.
        Wire services explicitly in `src/Resources/config/services.yaml` (no autowiring in the bundle).

    - path: "src/Resources/assets/**/*.ts"
      instructions: |
        TypeScript sources for the consent modal. Keep JSDoc in English.
        Built output is committed to `src/Resources/public/nowo-consent-modal.js` via `pnpm run build`.
        Match existing Vitest coverage patterns when changing behaviour.

    - path: "tests/**/*.php"
      instructions: |
        PHPUnit tests targeting ~100% line coverage on `src/`. Add tests for new behaviour.
        Avoid mocking final classes when PHPUnit blocks it; prefer real instances with mocked collaborators.

    - path: "docs/**/*.md"
      instructions: |
        User-facing documentation in English under `docs/`. Do not invent features or commands.
        Keep CHANGELOG and UPGRADING aligned for user-visible changes.

    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions workflows. Match existing style (checkout@v6, matrix exclusions for PHP/Symfony).
        Do not echo secrets. Pin third-party actions to major versions already used in this repo.

  tools:
    phpstan:
      enabled: true
    phpcs:
      enabled: false
    phpmd:
      enabled: false
    yamllint:
      enabled: true
    hadolint:
      enabled: true
    gitleaks:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 900000
    actionlint:
      enabled: true
    zizmor:
      enabled: true

knowledge_base:
  learnings:
    scope: auto
  pull_requests:
    scope: auto
