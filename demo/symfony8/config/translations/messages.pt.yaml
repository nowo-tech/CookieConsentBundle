demo.legal.updated: 'Documento de demonstração — apenas ilustrativo, não constitui aconselhamento jurídico. Última atualização: junho de 2025.'
demo.legal.related: 'Documentos relacionados'
demo.legal.privacy.title: 'Política de privacidade'
demo.legal.privacy.s1.title: '1. Responsável pelo tratamento'
demo.legal.privacy.s1.body: 'Esta aplicação de demonstração Symfony («Demo Cookie Consent») é publicada para fins técnicos. Em produção deve identificar a sua organização como responsável pelo tratamento, com contactos e, se aplicável, o encarregado de proteção de dados.'
demo.legal.privacy.s2.title: '2. Dados pessoais tratados'
demo.legal.privacy.s2.body: 'Nesta demo podemos tratar: endereços IP anonimizados e escolhas de consentimento armazenadas em cookies; registos de consentimento em SQLite quando o registo está ativo; registos técnicos do servidor web. Não são recolhidas contas de utilizador reais nem dados de pagamento.'
demo.legal.privacy.s3.title: '3. Finalidades e bases jurídicas'
demo.legal.privacy.s3.body: 'O tratamento estritamente necessário (sessão, segurança, armazenar o consentimento) baseia-se em interesse legítimo / necessidade. Cookies de funcionalidade, preferências, analítica e marketing só são usados com o seu consentimento (art. 6.º, n.º 1, al. a) RGPD). Os registos de consentimento apoiam a responsabilização (art. 6.º, n.º 1, al. f) RGPD, quando aplicável).'
demo.legal.privacy.s4.title: '4. Conservação'
demo.legal.privacy.s4.body: 'Os cookies de consentimento são conservados até 12 meses salvo eliminação antecipada. As linhas do registo devem ser eliminadas conforme a política de retenção; em produção defina e documente esse prazo no aviso de privacidade.'
demo.legal.privacy.s5.title: '5. Os seus direitos'
demo.legal.privacy.s5.body: 'Tem direito de acesso, retificação, apagamento, limitação, oposição e portabilidade quando aplicável. Pode retirar o consentimento de cookies a qualquer momento sem afetar a licitude do tratamento baseado no consentimento anterior. Contacte o responsável para exercer os seus direitos.'
demo.legal.privacy.s6.title: '6. Mais informações'
demo.legal.privacy.s6.body: 'Consulte a nossa Política de cookies para a descrição por categorias, incluindo a tabela de inventário de cookies, e a página Informação sobre consentimento para saber como as escolhas são recolhidas e armazenadas.'
demo.legal.cookies.title: 'Política de cookies'
demo.legal.cookies.s1.title: '1. O que são cookies?'
demo.legal.cookies.s1.body: 'Os cookies são pequenos ficheiros de texto armazenados no seu dispositivo. Nesta política incluímos também tecnologias similares (armazenamento local, pixels).'
demo.legal.cookies.s2.title: '2. Cookies estritamente necessários'
demo.legal.cookies.s2.body: 'Indispensáveis para segurança, encaminhamento e memorizar o consentimento (p. ex. Cookie_Consent, indicadores de categoria). Não requerem consentimento e não podem ser desativados no modal.'
demo.legal.cookies.s3.title: '3. Cookies de funcionalidade e preferências'
demo.legal.cookies.s3.body: 'Os cookies de funcionalidade permitem funções avançadas; os de preferências memorizam idioma e opções de interface. Base jurídica: consentimento. Duração máxima: 12 meses. Ativados apenas se habilitar as categorias «Funcionalidade» ou «Preferências».'
demo.legal.cookies.s4.title: '4. Cookies de analítica'
demo.legal.cookies.s4.body: 'Medem visitas e navegação de forma agregada (marcadores demo como _ga_demo). Base jurídica: consentimento. Terceiros: apenas fornecedor de analítica de demonstração — sem rastreamento real nesta demo.'
demo.legal.cookies.s5.title: '5. Cookies de marketing'
demo.legal.cookies.s5.body: 'Usados para publicidade e medição de conversões (marcadores demo como _fbp_demo). Base jurídica: consentimento. Terceiros: apenas plataformas publicitárias de demonstração.'
demo.legal.cookies.s6.title: '6. Gestão de cookies e inventário'
demo.legal.cookies.s6.body: 'Use «Definições de cookies» no rodapé ou na navegação para alterar ou retirar o consentimento. Os administradores podem manter a tabela de inventário de cookies por perfil de consentimento (nome, fornecedor, categoria, duração, tipo). Também pode eliminar cookies no navegador. Recusar os não essenciais não bloqueia o acesso à demo.'
demo.legal.consent.title: 'Informação sobre consentimento'
demo.legal.consent.s1.title: '1. Como obtemos o consentimento'
demo.legal.consent.s1.body: 'Na primeira visita (ou após revisão da política) uma camada pede para aceitar todos os cookies, rejeitar os não essenciais ou personalizar categorias. Cookies não essenciais não são instalados até confirmar a escolha.'
demo.legal.consent.s2.title: '2. Escolhas granulares'
demo.legal.consent.s2.body: 'Pode ativar ou desativar funcionalidade, preferências, analítica e marketing de forma independente. Os cookies estritamente necessários permanecem ativos porque o site não pode funcionar sem eles.'
demo.legal.consent.s3.title: '3. Retirada do consentimento'
demo.legal.consent.s3.body: 'Abra «Definições de cookies» a qualquer momento para atualizar preferências. Se a limpeza automática estiver ativa, revogar uma categoria remove os cookies demo associados no navegador.'
demo.legal.consent.s4.title: '4. Consequências da recusa'
demo.legal.consent.s4.body: 'Se rejeitar cookies não essenciais, funções opcionais (scripts de analítica ou marketing demo) não serão executados. A funcionalidade principal da demo permanece disponível.'
demo.legal.consent.s5.title: '5. Prova do consentimento'
demo.legal.consent.s5.body: 'Com o registo ativo, a demo armazena IP anonimizado, marca temporal, categorias aceites e revisão da política em SQLite para responsabilização. Descreva este tratamento no aviso de privacidade em produção.'
