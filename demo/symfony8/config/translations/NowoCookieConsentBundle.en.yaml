nowo_cookie_consent.title: "Hello traveller, it's cookie time!"
nowo_cookie_consent.intro: 'Cookies on this website are used to personalise content and ads, provide social media features and analyse traffic. We also share information about your use of the website with our social media, advertising and analytics partners, who may combine it with other information you have provided to them or that they have collected from your use of their services.'
nowo_cookie_consent.read_more: 'Read our cookie policy'
nowo_cookie_consent.required.title: 'Strictly necessary'
nowo_cookie_consent.required.description: 'Required for security, session management and storing your choices. Legal basis: legitimate interest / strictly necessary. Always active.'
nowo_cookie_consent.functionality.title: 'Functionality'
nowo_cookie_consent.functionality.description: 'Enhanced features and personalization. Legal basis: consent (Art. 6(1)(a) GDPR).'
nowo_cookie_consent.preferences.title: 'Preferences'
nowo_cookie_consent.preferences.description: 'Remember language and display settings. Legal basis: consent (Art. 6(1)(a) GDPR). Duration: up to 12 months.'
nowo_cookie_consent.analytics.title: 'Analytics'
nowo_cookie_consent.analytics.description: 'Anonymous statistics on visits and navigation. Legal basis: consent. Demo provider only; no real tracking.'
nowo_cookie_consent.marketing.title: 'Marketing'
nowo_cookie_consent.marketing.description: 'Advertising and conversion measurement. Legal basis: consent. Demo placeholders only; no real ad networks.'
