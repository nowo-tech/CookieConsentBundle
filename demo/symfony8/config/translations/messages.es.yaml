demo.legal.updated: 'Documento de demostración — solo ilustrativo, no constituye asesoramiento legal. Última actualización: junio de 2025.'
demo.legal.related: 'Documentos relacionados'
demo.legal.privacy.title: 'Política de privacidad'
demo.legal.privacy.s1.title: '1. Responsable del tratamiento'
demo.legal.privacy.s1.body: 'Esta aplicación de demostración Symfony («Demo Cookie Consent») se publica con fines técnicos. En un sitio en producción debe identificar a su organización como responsable del tratamiento, con datos de contacto y, si procede, el delegado de protección de datos.'
demo.legal.privacy.s2.title: '2. Datos personales que tratamos'
demo.legal.privacy.s2.body: 'En esta demo podemos tratar: direcciones IP anonimizadas y elecciones de consentimiento almacenadas en cookies; registros de consentimiento en SQLite cuando el registro está activo; y registros técnicos del servidor web. No se recogen cuentas de usuario ni datos de pago reales.'
demo.legal.privacy.s3.title: '3. Finalidades y bases jurídicas'
demo.legal.privacy.s3.body: 'El tratamiento estrictamente necesario (sesión, seguridad, almacenar el consentimiento) se basa en interés legítimo / necesidad. Las cookies de funcionalidad, preferencias, analítica y marketing solo se usan con su consentimiento (art. 6.1.a RGPD). Los registros de consentimiento apoyan la responsabilidad proactiva (art. 6.1.f RGPD, cuando corresponda).'
demo.legal.privacy.s4.title: '4. Conservación'
demo.legal.privacy.s4.body: 'Las cookies de consentimiento se conservan hasta 12 meses salvo que las elimine antes. Las filas del registro de consentimiento deben purgarse según su política de retención; en producción defina y documente ese plazo en su aviso de privacidad.'
demo.legal.privacy.s5.title: '5. Sus derechos'
demo.legal.privacy.s5.body: 'Tiene derecho de acceso, rectificación, supresión, limitación, oposición y portabilidad cuando proceda. Puede retirar el consentimiento de cookies en cualquier momento sin afectar a la licitud del tratamiento basado en el consentimiento previo. Contacte con el responsable para ejercer sus derechos.'
demo.legal.privacy.s6.title: '6. Más información'
demo.legal.privacy.s6.body: 'Consulte nuestra Política de cookies para el detalle por categorías, incluida la tabla de inventario de cookies, y la página de Información sobre el consentimiento para saber cómo se recogen y almacenan las elecciones.'
demo.legal.cookies.title: 'Política de cookies'
demo.legal.cookies.s1.title: '1. ¿Qué son las cookies?'
demo.legal.cookies.s1.body: 'Las cookies son pequeños archivos de texto almacenados en su dispositivo. En esta política también incluimos tecnologías similares (almacenamiento local, píxeles).'
demo.legal.cookies.s2.title: '2. Cookies estrictamente necesarias'
demo.legal.cookies.s2.body: 'Imprescindibles para la seguridad, el enrutamiento y recordar su consentimiento (p. ej. Cookie_Consent, indicadores por categoría). No requieren consentimiento y no pueden desactivarse en el modal.'
demo.legal.cookies.s3.title: '3. Cookies de funcionalidad y preferencias'
demo.legal.cookies.s3.body: 'Las cookies de funcionalidad habilitan funciones mejoradas; las de preferencias recuerdan idioma y opciones de interfaz. Base jurídica: consentimiento. Duración máxima: 12 meses. Solo se activan si habilita las categorías «Funcionalidad» o «Preferencias».'
demo.legal.cookies.s4.title: '4. Cookies de analítica'
demo.legal.cookies.s4.body: 'Miden visitas y navegación de forma agregada (marcadores de demo como _ga_demo). Base jurídica: consentimiento. Terceros: solo proveedor de analítica de demostración; no hay seguimiento real en esta demo.'
demo.legal.cookies.s5.title: '5. Cookies de marketing'
demo.legal.cookies.s5.body: 'Usadas para publicidad y medición de conversiones (marcadores de demo como _fbp_demo). Base jurídica: consentimiento. Terceros: solo plataformas publicitarias de demostración.'
demo.legal.cookies.s6.title: '6. Gestión de cookies e inventario'
demo.legal.cookies.s6.body: 'Use «Configuración de cookies» en el pie o la navegación para cambiar o retirar el consentimiento. Los administradores pueden mantener la tabla de inventario de cookies por perfil de consentimiento (nombre, proveedor, categoría, duración, tipo). También puede eliminar cookies desde su navegador. Rechazar las no esenciales no bloquea el acceso a la demo.'
demo.legal.consent.title: 'Información sobre el consentimiento'
demo.legal.consent.s1.title: '1. Cómo obtenemos el consentimiento'
demo.legal.consent.s1.body: 'En su primera visita (o tras una revisión de la política) una capa le pide aceptar todas las cookies, rechazar las no esenciales o personalizar categorías. Las cookies no esenciales no se instalan hasta que confirme su elección.'
demo.legal.consent.s2.title: '2. Elecciones granulares'
demo.legal.consent.s2.body: 'Puede activar o desactivar funcionalidad, preferencias, analítica y marketing de forma independiente. Las cookies estrictamente necesarias permanecen activas porque el sitio no puede funcionar sin ellas.'
demo.legal.consent.s3.title: '3. Retirada del consentimiento'
demo.legal.consent.s3.body: 'Abra «Configuración de cookies» en cualquier momento para actualizar preferencias. Si la limpieza automática está activa, revocar una categoría elimina las cookies de demo asociadas en su navegador.'
demo.legal.consent.s4.title: '4. Consecuencias del rechazo'
demo.legal.consent.s4.body: 'Si rechaza las cookies no esenciales, las funciones opcionales (scripts de analítica o marketing de demo) no se ejecutarán. La funcionalidad principal de la demo sigue disponible.'
demo.legal.consent.s5.title: '5. Prueba del consentimiento'
demo.legal.consent.s5.body: 'Con el registro activo, la demo almacena IP anonimizada, marca temporal, categorías aceptadas y revisión de la política en SQLite con fines de responsabilidad proactiva. Describa este tratamiento en su aviso de privacidad en producción.'
