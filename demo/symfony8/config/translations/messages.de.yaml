demo.legal.updated: 'Demo-Dokument — nur zur Veranschaulichung, keine Rechtsberatung. Zuletzt aktualisiert: Juni 2025.'
demo.legal.related: 'Verwandte Dokumente'
demo.legal.privacy.title: 'Datenschutzerklärung'
demo.legal.privacy.s1.title: '1. Verantwortlicher'
demo.legal.privacy.s1.body: 'Diese Symfony-Demo-Anwendung („Demo Cookie Consent“) dient technischen Illustrationszwecken. In Produktion müssen Sie Ihre Organisation als Verantwortlichen mit Kontaktdaten und ggf. Datenschutzbeauftragten benennen.'
demo.legal.privacy.s2.title: '2. Verarbeitete personenbezogene Daten'
demo.legal.privacy.s2.body: 'In dieser Demo können wir verarbeiten: anonymisierte IP-Adressen und Einwilligungsentscheidungen in Cookies; Einwilligungsprotokolle in SQLite bei aktiviertem Logging; technische Webserver-Logs. Es werden keine echten Benutzerkonten oder Zahlungsdaten erhoben.'
demo.legal.privacy.s3.title: '3. Zwecke und Rechtsgrundlagen'
demo.legal.privacy.s3.body: 'Streng notwendige Verarbeitung (Sitzung, Sicherheit, Speicherung der Einwilligung) stützt sich auf berechtigtes Interesse / Erforderlichkeit. Funktionalitäts-, Präferenz-, Analyse- und Marketing-Cookies werden nur mit Ihrer Einwilligung genutzt (Art. 6 Abs. 1 lit. a DSGVO). Einwilligungsprotokolle unterstützen die Rechenschaftspflicht (Art. 6 Abs. 1 lit. f DSGVO, soweit anwendbar).'
demo.legal.privacy.s4.title: '4. Aufbewahrung'
demo.legal.privacy.s4.body: 'Einwilligungs-Cookies werden bis zu 12 Monate aufbewahrt, sofern Sie sie nicht früher löschen. Protokollzeilen sollten gemäß Ihrer Aufbewahrungsrichtlinie gelöscht werden; definieren und dokumentieren Sie diese Frist in Produktion in Ihrer Datenschutzerklärung.'
demo.legal.privacy.s5.title: '5. Ihre Rechte'
demo.legal.privacy.s5.body: 'Sie haben das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung, Widerspruch und Datenübertragbarkeit, soweit anwendbar. Sie können die Cookie-Einwilligung jederzeit widerrufen, ohne die Rechtmäßigkeit der vorherigen Verarbeitung zu beeinträchtigen. Wenden Sie sich an den Verantwortlichen, um Ihre Rechte auszuüben.'
demo.legal.privacy.s6.title: '6. Weitere Informationen'
demo.legal.privacy.s6.body: 'Siehe unsere Cookie-Richtlinie für eine Kategoriebeschreibung einschließlich der Cookie-Inventartabelle sowie die Seite Einwilligungsinformationen, wie Entscheidungen erfasst und gespeichert werden.'
demo.legal.cookies.title: 'Cookie-Richtlinie'
demo.legal.cookies.s1.title: '1. Was sind Cookies?'
demo.legal.cookies.s1.body: 'Cookies sind kleine Textdateien auf Ihrem Gerät. In dieser Richtlinie umfassen wir auch ähnliche Technologien (lokaler Speicher, Pixel).'
demo.legal.cookies.s2.title: '2. Unbedingt erforderliche Cookies'
demo.legal.cookies.s2.body: 'Erforderlich für Sicherheit, Routing und Speicherung Ihrer Einwilligung (z. B. Cookie_Consent, Kategorie-Flags). Sie erfordern keine Einwilligung und können im Modal nicht deaktiviert werden.'
demo.legal.cookies.s3.title: '3. Funktionalitäts- und Präferenz-Cookies'
demo.legal.cookies.s3.body: 'Funktionalitäts-Cookies ermöglichen erweiterte Funktionen; Präferenz-Cookies speichern Sprache und Oberflächenoptionen. Rechtsgrundlage: Einwilligung. Maximale Dauer: 12 Monate. Nur aktiv, wenn Sie „Funktionalität“ oder „Präferenzen“ aktivieren.'
demo.legal.cookies.s4.title: '4. Analyse-Cookies'
demo.legal.cookies.s4.body: 'Messen Besuche und Navigation aggregiert (Demo-Platzhalter wie _ga_demo). Rechtsgrundlage: Einwilligung. Dritte: nur Demo-Analyseanbieter — kein echtes Tracking in dieser Demo.'
demo.legal.cookies.s5.title: '5. Marketing-Cookies'
demo.legal.cookies.s5.body: 'Für Werbung und Conversion-Messung (Demo-Platzhalter wie _fbp_demo). Rechtsgrundlage: Einwilligung. Dritte: nur Demo-Werbeplattformen.'
demo.legal.cookies.s6.title: '6. Cookie-Verwaltung und Inventar'
demo.legal.cookies.s6.body: 'Nutzen Sie „Cookie-Einstellungen“ in der Fußzeile oder Navigation, um die Einwilligung zu ändern oder zu widerrufen. Administratoren können die Cookie-Inventartabelle pro Einwilligungsprofil pflegen (Name, Anbieter, Kategorie, Dauer, Typ). Sie können Cookies auch im Browser löschen. Das Ablehnen nicht essentieller Cookies blockiert den Demo-Zugang nicht.'
demo.legal.consent.title: 'Einwilligungsinformationen'
demo.legal.consent.s1.title: '1. Wie wir die Einwilligung einholen'
demo.legal.consent.s1.body: 'Beim ersten Besuch (oder nach einer Richtlinienrevision) fragt eine Ebene, ob Sie alle Cookies akzeptieren, nicht essentielle ablehnen oder Kategorien anpassen möchten. Nicht essentielle Cookies werden erst nach Bestätigung gesetzt.'
demo.legal.consent.s2.title: '2. Granulare Entscheidungen'
demo.legal.consent.s2.body: 'Sie können Funktionalität, Präferenzen, Analytik und Marketing unabhängig aktivieren oder deaktivieren. Unbedingt erforderliche Cookies bleiben aktiv, da die Seite ohne sie nicht funktioniert.'
demo.legal.consent.s3.title: '3. Widerruf der Einwilligung'
demo.legal.consent.s3.body: 'Öffnen Sie jederzeit „Cookie-Einstellungen“, um Präferenzen zu aktualisieren. Bei aktivierter Auto-Löschung entfernt der Widerruf einer Kategorie zugehörige Demo-Cookies aus Ihrem Browser.'
demo.legal.consent.s4.title: '4. Folgen der Ablehnung'
demo.legal.consent.s4.body: 'Wenn Sie nicht essentielle Cookies ablehnen, werden optionale Funktionen (Demo-Analyse- oder Marketing-Skripte) nicht ausgeführt. Die Kernfunktionalität der Demo bleibt verfügbar.'
demo.legal.consent.s5.title: '5. Nachweis der Einwilligung'
demo.legal.consent.s5.body: 'Bei aktiviertem Logging speichert die Demo anonymisierte IP, Zeitstempel, akzeptierte Kategorien und Richtlinienrevision in SQLite zur Rechenschaftspflicht. Beschreiben Sie diese Verarbeitung in Ihrer Produktions-Datenschutzerklärung.'
