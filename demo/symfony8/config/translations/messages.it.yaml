demo.legal.updated: 'Documento dimostrativo — solo a scopo illustrativo, non costituisce consulenza legale. Ultimo aggiornamento: giugno 2025.'
demo.legal.related: 'Documenti correlati'
demo.legal.privacy.title: 'Informativa sulla privacy'
demo.legal.privacy.s1.title: '1. Titolare del trattamento'
demo.legal.privacy.s1.body: 'Questa applicazione demo Symfony («Demo Cookie Consent») è pubblicata a fini tecnici. In produzione deve identificare la propria organizzazione come titolare del trattamento, con recapiti e, se richiesto, il responsabile della protezione dei dati.'
demo.legal.privacy.s2.title: '2. Dati personali trattati'
demo.legal.privacy.s2.body: 'In questa demo possiamo trattare: indirizzi IP anonimizzati e scelte di consenso memorizzate nei cookie; log del consenso in SQLite quando la registrazione è attiva; log tecnici del server web. Non vengono raccolti account utente reali né dati di pagamento.'
demo.legal.privacy.s3.title: '3. Finalità e basi giuridiche'
demo.legal.privacy.s3.body: 'Il trattamento strettamente necessario (sessione, sicurezza, memorizzazione del consenso) si basa su interesse legittimo / necessità. Cookie di funzionalità, preferenze, analitica e marketing sono usati solo con il suo consenso (art. 6.1.a GDPR). I log del consenso supportano la responsabilizzazione (art. 6.1.f GDPR, ove applicabile).'
demo.legal.privacy.s4.title: '4. Conservazione'
demo.legal.privacy.s4.body: 'I cookie di consenso sono conservati fino a 12 mesi salvo cancellazione anticipata. Le righe del log devono essere eliminate secondo la policy di conservazione; in produzione definisca e documenti tale periodo nell''informativa privacy.'
demo.legal.privacy.s5.title: '5. I suoi diritti'
demo.legal.privacy.s5.body: 'Ha diritto di accesso, rettifica, cancellazione, limitazione, opposizione e portabilità ove applicabile. Può revocare il consenso ai cookie in qualsiasi momento senza pregiudicare la liceità del trattamento basato sul consenso precedente. Contatti il titolare per esercitare i diritti.'
demo.legal.privacy.s6.title: '6. Ulteriori informazioni'
demo.legal.privacy.s6.body: 'Consultare la nostra Informativa sui cookie per la descrizione per categoria, inclusa la tabella di inventario cookie, e la pagina Informazioni sul consenso per sapere come vengono raccolte e memorizzate le scelte.'
demo.legal.cookies.title: 'Informativa sui cookie'
demo.legal.cookies.s1.title: '1. Cosa sono i cookie?'
demo.legal.cookies.s1.body: 'I cookie sono piccoli file di testo memorizzati sul dispositivo. In questa informativa includiamo anche tecnologie simili (archiviazione locale, pixel).'
demo.legal.cookies.s2.title: '2. Cookie strettamente necessari'
demo.legal.cookies.s2.body: 'Indispensabili per sicurezza, routing e memorizzazione del consenso (es. Cookie_Consent, flag di categoria). Non richiedono consenso e non possono essere disattivati nel modal.'
demo.legal.cookies.s3.title: '3. Cookie di funzionalità e preferenze'
demo.legal.cookies.s3.body: 'I cookie di funzionalità abilitano funzioni avanzate; quelli di preferenza memorizzano lingua e scelte dell''interfaccia. Base giuridica: consenso. Durata massima: 12 mesi. Attivati solo se abilita le categorie «Funzionalità» o «Preferenze».'
demo.legal.cookies.s4.title: '4. Cookie analitici'
demo.legal.cookies.s4.body: 'Misurano visite e navigazione in forma aggregata (segnaposto demo come _ga_demo). Base giuridica: consenso. Terze parti: solo fornitore analitico dimostrativo — nessun tracciamento reale in questa demo.'
demo.legal.cookies.s5.title: '5. Cookie di marketing'
demo.legal.cookies.s5.body: 'Usati per pubblicità e misurazione conversioni (segnaposto demo come _fbp_demo). Base giuridica: consenso. Terze parti: solo piattaforme pubblicitarie dimostrative.'
demo.legal.cookies.s6.title: '6. Gestione cookie e inventario'
demo.legal.cookies.s6.body: 'Usi «Impostazioni cookie» nel footer o nella navigazione per modificare o revocare il consenso. Gli amministratori possono gestire la tabella di inventario cookie per profilo di consenso (nome, fornitore, categoria, durata, tipo). Può anche eliminare i cookie dal browser. Rifiutare i non essenziali non blocca l''accesso alla demo.'
demo.legal.consent.title: 'Informazioni sul consenso'
demo.legal.consent.s1.title: '1. Come otteniamo il consenso'
demo.legal.consent.s1.body: 'Alla prima visita (o dopo una revisione dell''informativa) un layer chiede di accettare tutti i cookie, rifiutare i non essenziali o personalizzare le categorie. I cookie non essenziali non vengono impostati finché non conferma la scelta.'
demo.legal.consent.s2.title: '2. Scelte granulari'
demo.legal.consent.s2.body: 'Può attivare o disattivare funzionalità, preferenze, analitica e marketing in modo indipendente. I cookie strettamente necessari restano attivi perché il sito non può funzionare senza di essi.'
demo.legal.consent.s3.title: '3. Revoca del consenso'
demo.legal.consent.s3.body: 'Apri «Impostazioni cookie» in qualsiasi momento per aggiornare le preferenze. Se la cancellazione automatica è attiva, revocare una categoria rimuove i cookie demo associati dal browser.'
demo.legal.consent.s4.title: '4. Conseguenze del rifiuto'
demo.legal.consent.s4.body: 'Se rifiuta i cookie non essenziali, le funzioni opzionali (script analitici o marketing demo) non verranno eseguiti. La funzionalità principale della demo resta disponibile.'
demo.legal.consent.s5.title: '5. Prova del consenso'
demo.legal.consent.s5.body: 'Con la registrazione attiva, la demo memorizza IP anonimizzato, timestamp, categorie accettate e revisione dell''informativa in SQLite per responsabilizzazione. Descriva questo trattamento nell''informativa privacy in produzione.'
