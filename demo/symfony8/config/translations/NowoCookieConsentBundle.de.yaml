nowo_cookie_consent.title: 'Cookie-Einstellungen'
nowo_cookie_consent.intro: 'Wir verwenden Cookies und ähnliche Technologien. Unbedingt erforderliche Cookies sind immer aktiv, da sie für den Betrieb der Website notwendig sind (Sicherheit, Sitzung, Speicherung der Einwilligung). Analyse-, Marketing- und Präferenz-Cookies sind optional und werden nur mit Ihrer Einwilligung gemäß Art. 6 Abs. 1 lit. a DSGVO aktiviert.'
