nowo_cookie_consent.title: 'Preferències de galetes'
nowo_cookie_consent.intro: 'Utilitzem galetes i tecnologies similars. Les galetes estrictament necessàries estan sempre actives perquè són imprescindibles per al funcionament del lloc (seguretat, sessió, emmagatzematge del consentiment). Les galetes d’anàlisi, màrqueting i preferències són opcionals i només s’activen amb el vostre consentiment d’acord amb l’art. 6.1.a) del RGPD.'
