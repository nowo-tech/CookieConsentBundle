nowo_cookie_consent.title: 'Hola viajero, ¡es la hora de las cookies!'
nowo_cookie_consent.intro: 'Las cookies de este sitio web se utilizan para personalizar el contenido y los anuncios, ofrecer funciones de redes sociales y analizar el tráfico. También compartimos información sobre el uso que haga del sitio web con nuestros partners de redes sociales, publicidad y análisis, que pueden combinarla con otra información que les haya proporcionado o que hayan recopilado del uso que haga de sus servicios.'
