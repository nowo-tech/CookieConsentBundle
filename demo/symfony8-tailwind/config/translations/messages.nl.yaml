demo.legal.updated: 'Demodocument — alleen ter illustratie, geen juridisch advies. Laatst bijgewerkt: juni 2025.'
demo.legal.related: 'Gerelateerde documenten'
demo.legal.privacy.title: 'Privacybeleid'
demo.legal.privacy.s1.title: '1. Verwerkingsverantwoordelijke'
demo.legal.privacy.s1.body: 'Deze Symfony-demo-applicatie («Demo Cookie Consent») is gepubliceerd voor technische illustratie. In productie moet u uw organisatie als verwerkingsverantwoordelijke identificeren, met contactgegevens en, indien vereist, uw functionaris gegevensbescherming.'
demo.legal.privacy.s2.title: '2. Verwerkte persoonsgegevens'
demo.legal.privacy.s2.body: 'In deze demo kunnen we verwerken: geanonimiseerde IP-adressen en toestemmingskeuzes in cookies; toestemmingslogs in SQLite wanneer logging is ingeschakeld; technische webserverlogs. Er worden geen echte gebruikersaccounts of betaalgegevens verzameld.'
demo.legal.privacy.s3.title: '3. Doeleinden en rechtsgronden'
demo.legal.privacy.s3.body: 'Strikt noodzakelijke verwerking (sessie, beveiliging, opslaan van toestemming) steunt op gerechtvaardigd belang / noodzaak. Functionaliteits-, voorkeurs-, analyse- en marketingcookies worden alleen gebruikt met uw toestemming (art. 6 lid 1 onder a AVG). Toestemmingslogs ondersteunen verantwoording (art. 6 lid 1 onder f AVG, indien van toepassing).'
demo.legal.privacy.s4.title: '4. Bewaring'
demo.legal.privacy.s4.body: 'Toestemmingscookies worden tot 12 maanden bewaard tenzij u ze eerder wist. Logregels moeten worden verwijderd volgens uw bewaarbeleid; definieer en documenteer deze termijn in productie in uw privacyverklaring.'
demo.legal.privacy.s5.title: '5. Uw rechten'
demo.legal.privacy.s5.body: 'U heeft recht op inzage, rectificatie, wissing, beperking, bezwaar en dataportabiliteit waar van toepassing. U kunt cookie-toestemming te allen tijde intrekken zonder de rechtmatigheid van eerdere verwerking op basis van toestemming te beïnvloeden. Neem contact op met de verwerkingsverantwoordelijke om uw rechten uit te oefenen.'
demo.legal.privacy.s6.title: '6. Meer informatie'
demo.legal.privacy.s6.body: 'Zie ons Cookiebeleid voor een beschrijving per categorie, inclusief de cookie-inventaristabel, en de pagina Toestemmingsinformatie voor hoe keuzes worden verzameld en opgeslagen.'
demo.legal.cookies.title: 'Cookiebeleid'
demo.legal.cookies.s1.title: '1. Wat zijn cookies?'
demo.legal.cookies.s1.body: 'Cookies zijn kleine tekstbestanden op uw apparaat. In dit beleid omvatten we ook vergelijkbare technologieën (lokale opslag, pixels).'
demo.legal.cookies.s2.title: '2. Strikt noodzakelijke cookies'
demo.legal.cookies.s2.body: 'Noodzakelijk voor beveiliging, routing en het onthouden van uw toestemming (bijv. Cookie_Consent, categorievlaggen). Deze vereisen geen toestemming en kunnen niet worden uitgeschakeld in de modal.'
demo.legal.cookies.s3.title: '3. Functionaliteits- en voorkeurscookies'
demo.legal.cookies.s3.body: 'Functionaliteitscookies maken uitgebreide functies mogelijk; voorkeurscookies onthouden taal en interfacekeuzes. Rechtsgrond: toestemming. Maximale duur: 12 maanden. Alleen actief als u «Functionaliteit» of «Voorkeuren» inschakelt.'
demo.legal.cookies.s4.title: '4. Analysecookies'
demo.legal.cookies.s4.body: 'Meten bezoeken en navigatie geaggregeerd (demo-placeholders zoals _ga_demo). Rechtsgrond: toestemming. Derden: alleen demo-analyseaanbieder — geen echte tracking in deze demo.'
demo.legal.cookies.s5.title: '5. Marketingcookies'
demo.legal.cookies.s5.body: 'Gebruikt voor advertenties en conversiemeting (demo-placeholders zoals _fbp_demo). Rechtsgrond: toestemming. Derden: alleen demo-advertentieplatformen.'
demo.legal.cookies.s6.title: '6. Cookiebeheer en inventaris'
demo.legal.cookies.s6.body: 'Gebruik «Cookie-instellingen» in de footer of navigatie om toestemming te wijzigen of in te trekken. Beheerders kunnen de cookie-inventaristabel per toestemmingsprofiel onderhouden (naam, aanbieder, categorie, duur, type). U kunt cookies ook via uw browser verwijderen. Weigeren van niet-essentiële cookies blokkeert de demo-toegang niet.'
demo.legal.consent.title: 'Toestemmingsinformatie'
demo.legal.consent.s1.title: '1. Hoe we toestemming verkrijgen'
demo.legal.consent.s1.body: 'Bij uw eerste bezoek (of na een beleidsrevisie) vraagt een laag u alle cookies te accepteren, niet-essentiële te weigeren of categorieën aan te passen. Niet-essentiële cookies worden pas geplaatst nadat u uw keuze bevestigt.'
demo.legal.consent.s2.title: '2. Granulaire keuzes'
demo.legal.consent.s2.body: 'U kunt functionaliteit, voorkeuren, analyse en marketing onafhankelijk in- of uitschakelen. Strikt noodzakelijke cookies blijven actief omdat de site zonder hen niet kan functioneren.'
demo.legal.consent.s3.title: '3. Intrekken van toestemming'
demo.legal.consent.s3.body: 'Open «Cookie-instellingen» op elk moment om voorkeuren bij te werken. Wanneer auto-wissen is ingeschakeld, verwijdert het intrekken van een categorie bijbehorende demo-cookies uit uw browser.'
demo.legal.consent.s4.title: '4. Gevolgen van weigering'
demo.legal.consent.s4.body: 'Als u niet-essentiële cookies weigert, worden optionele functies (demo-analyse- of marketingscripts) niet uitgevoerd. De kernfunctionaliteit van de demo blijft beschikbaar.'
demo.legal.consent.s5.title: '5. Bewijs van toestemming'
demo.legal.consent.s5.body: 'Wanneer logging is ingeschakeld, slaat de demo een geanonimiseerd IP, tijdstempel, geaccepteerde categorieën en beleidsrevisie op in SQLite voor verantwoording. Beschrijf deze verwerking in uw productie-privacyverklaring.'
