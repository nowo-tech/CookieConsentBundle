nowo_cookie_consent.title: 'Preferencje plików cookie'
nowo_cookie_consent.intro: 'Używamy plików cookie i podobnych technologii. Ściśle niezbędne pliki cookie są zawsze aktywne, ponieważ są wymagane do działania witryny (bezpieczeństwo, sesja, przechowywanie zgody). Pliki analityczne, marketingowe i preferencyjne są opcjonalne i aktywowane wyłącznie za Twoją zgodą na podstawie art. 6 ust. 1 lit. a RODO.'
