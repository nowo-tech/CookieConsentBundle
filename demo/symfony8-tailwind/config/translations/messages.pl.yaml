demo.legal.updated: 'Dokument demonstracyjny — wyłącznie ilustracyjny, nie stanowi porady prawnej. Ostatnia aktualizacja: czerwiec 2025.'
demo.legal.related: 'Powiązane dokumenty'
demo.legal.privacy.title: 'Polityka prywatności'
demo.legal.privacy.s1.title: '1. Administrator danych'
demo.legal.privacy.s1.body: 'Ta demonstracyjna aplikacja Symfony («Demo Cookie Consent») jest publikowana w celach technicznych. W produkcji należy wskazać organizację jako administratora danych, z danymi kontaktowymi i, jeśli wymagane, inspektorem ochrony danych.'
demo.legal.privacy.s2.title: '2. Przetwarzane dane osobowe'
demo.legal.privacy.s2.body: 'W tej demo możemy przetwarzać: zanonimizowane adresy IP i wybory zgody w cookies; logi zgody w SQLite gdy rejestrowanie jest włączone; logi techniczne serwera WWW. Nie zbieramy prawdziwych kont użytkowników ani danych płatności.'
demo.legal.privacy.s3.title: '3. Cele i podstawy prawne'
demo.legal.privacy.s3.body: 'Przetwarzanie ściśle konieczne (sesja, bezpieczeństwo, zapisywanie zgody) opiera się na prawnie uzasadnionym interesie / konieczności. Cookies funkcjonalności, preferencji, analityki i marketingu są używane tylko za zgodą (art. 6 ust. 1 lit. a RODO). Logi zgody wspierają rozliczalność (art. 6 ust. 1 lit. f RODO, gdy ma zastosowanie).'
demo.legal.privacy.s4.title: '4. Okres przechowywania'
demo.legal.privacy.s4.body: 'Cookies zgody są przechowywane do 12 miesięcy, chyba że wcześniej je usuniesz. Wiersze logów należy usuwać zgodnie z polityką retencji; w produkcji określ i udokumentuj ten okres w informacji o prywatności.'
demo.legal.privacy.s5.title: '5. Twoje prawa'
demo.legal.privacy.s5.body: 'Masz prawo dostępu, sprostowania, usunięcia, ograniczenia, sprzeciwu i przenoszenia danych, gdy ma to zastosowanie. Możesz wycofać zgodę na cookies w dowolnym momencie bez wpływu na legalność wcześniejszego przetwarzania. Skontaktuj się z administratorem, aby skorzystać z praw.'
demo.legal.privacy.s6.title: '6. Więcej informacji'
demo.legal.privacy.s6.body: 'Zobacz naszą Politykę cookies dla opisu według kategorii, w tym tabeli inwentarza cookies, oraz stronę Informacje o zgodzie, jak wybory są zbierane i przechowywane.'
demo.legal.cookies.title: 'Polityka cookies'
demo.legal.cookies.s1.title: '1. Czym są cookies?'
demo.legal.cookies.s1.body: 'Cookies to małe pliki tekstowe przechowywane na urządzeniu. W tej polityce obejmujemy też podobne technologie (pamięć lokalna, piksele).'
demo.legal.cookies.s2.title: '2. Cookies ściśle konieczne'
demo.legal.cookies.s2.body: 'Niezbędne dla bezpieczeństwa, routingu i zapamiętania zgody (np. Cookie_Consent, flagi kategorii). Nie wymagają zgody i nie można ich wyłączyć w modalu.'
demo.legal.cookies.s3.title: '3. Cookies funkcjonalności i preferencji'
demo.legal.cookies.s3.body: 'Cookies funkcjonalności umożliwiają rozszerzone funkcje; preferencji zapamiętują język i wybory interfejsu. Podstawa prawna: zgoda. Maksymalny czas: 12 miesięcy. Aktywne tylko po włączeniu kategorii «Funkcjonalność» lub «Preferencje».'
demo.legal.cookies.s4.title: '4. Cookies analityczne'
demo.legal.cookies.s4.body: 'Mierzą wizyty i nawigację w formie zagregowanej (placeholdery demo jak _ga_demo). Podstawa prawna: zgoda. Strony trzecie: tylko demonstracyjny dostawca analityki — brak rzeczywistego śledzenia w tej demo.'
demo.legal.cookies.s5.title: '5. Cookies marketingowe'
demo.legal.cookies.s5.body: 'Używane do reklamy i pomiaru konwersji (placeholdery demo jak _fbp_demo). Podstawa prawna: zgoda. Strony trzecie: tylko demonstracyjne platformy reklamowe.'
demo.legal.cookies.s6.title: '6. Zarządzanie cookies i inwentarzem'
demo.legal.cookies.s6.body: 'Użyj «Ustawienia cookies» w stopce lub nawigacji, aby zmienić lub wycofać zgodę. Administratorzy mogą utrzymywać tabelę inwentarza cookies na profil zgody (nazwa, dostawca, kategoria, czas trwania, typ). Możesz też usunąć cookies w przeglądarce. Odmowa nieistotnych cookies nie blokuje dostępu do demo.'
demo.legal.consent.title: 'Informacje o zgodzie'
demo.legal.consent.s1.title: '1. Jak uzyskujemy zgodę'
demo.legal.consent.s1.body: 'Przy pierwszej wizycie (lub po rewizji polityki) warstwa prosi o akceptację wszystkich cookies, odrzucenie nieistotnych lub dostosowanie kategorii. Nieistotne cookies nie są ustawiane, dopóki nie potwierdzisz wyboru.'
demo.legal.consent.s2.title: '2. Szczegółowe wybory'
demo.legal.consent.s2.body: 'Możesz niezależnie włączać lub wyłączać funkcjonalność, preferencje, analitykę i marketing. Cookies ściśle konieczne pozostają aktywne, ponieważ witryna nie może działać bez nich.'
demo.legal.consent.s3.title: '3. Wycofanie zgody'
demo.legal.consent.s3.body: 'Otwórz «Ustawienia cookies» w dowolnym momencie, aby zaktualizować preferencje. Gdy auto-czyszczenie jest włączone, cofnięcie kategorii usuwa powiązane cookies demo z przeglądarki.'
demo.legal.consent.s4.title: '4. Skutki odmowy'
demo.legal.consent.s4.body: 'Jeśli odrzucisz nieistotne cookies, opcjonalne funkcje (skrypty analityki lub marketingu demo) nie będą uruchamiane. Główna funkcjonalność demo pozostaje dostępna.'
demo.legal.consent.s5.title: '5. Dowód zgody'
demo.legal.consent.s5.body: 'Gdy rejestrowanie jest włączone, demo przechowuje zanonimizowane IP, znacznik czasu, zaakceptowane kategorie i rewizję polityki w SQLite dla rozliczalności. Opisz to przetwarzanie w informacji o prywatności w produkcji.'
