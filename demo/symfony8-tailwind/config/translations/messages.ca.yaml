demo.legal.related: 'Documents relacionats'
demo.legal.privacy.title: 'Política de privacitat'
demo.legal.privacy.s1.title: '1. Responsable del tractament'
demo.legal.privacy.s1.body: 'Aquesta aplicació de demostració Symfony («Demo Cookie Consent») es publica amb finalitats tècniques. En un lloc en producció heu d''identificar la vostra organització com a responsable del tractament, amb dades de contacte i, si escau, el delegat de protecció de dades.'
demo.legal.privacy.s2.title: '2. Dades personals que tractem'
demo.legal.privacy.s2.body: 'En aquesta demo podem tractar: adreces IP anonimitzades i eleccions de consentiment emmagatzemades en galetes; registres de consentiment a SQLite quan el registre està actiu; i registres tècnics del servidor web. No es recullen comptes d''usuari reals ni dades de pagament.'
demo.legal.privacy.s3.title: '3. Finalitats i bases jurídiques'
demo.legal.privacy.s3.body: 'El tractament estrictament necessari (sessió, seguretat, emmagatzemar el consentiment) es basa en interès legítim / necessitat. Les galetes de funcionalitat, preferències, analítica i màrqueting només s''utilitzen amb el vostre consentiment (art. 6.1.a RGPD). Els registres de consentiment donen suport a la responsabilitat proactiva (art. 6.1.f RGPD, quan correspon).'
demo.legal.privacy.s4.title: '4. Conservació'
demo.legal.privacy.s4.body: 'Les galetes de consentiment es conserven fins a 12 mesos llevat que les elimineu abans. Les files del registre de consentiment s''han de purgar segons la política de retenció; en producció definiu i documenteu aquest termini a l''avís de privacitat.'
demo.legal.privacy.s5.title: '5. Els vostres drets'
demo.legal.privacy.s5.body: 'Teniu dret d''accés, rectificació, supressió, limitació, oposició i portabilitat quan correspongui. Podeu retirar el consentiment de galetes en qualsevol moment sense afectar la licitud del tractament basat en el consentiment previ. Contacteu amb el responsable per exercir els vostres drets.'
demo.legal.privacy.s6.title: '6. Més informació'
demo.legal.privacy.s6.body: 'Consulteu la nostra Política de galetes per al detall per categories, inclosa la taula d''inventari de galetes, i la pàgina Informació sobre el consentiment per saber com es recullen i emmagatzemen les eleccions.'
demo.legal.cookies.title: 'Política de galetes'
demo.legal.cookies.s1.title: '1. Què són les galetes?'
demo.legal.cookies.s1.body: 'Les galetes són petits fitxers de text emmagatzemats al dispositiu. En aquesta política també incloem tecnologies similars (emmagatzematge local, píxels).'
demo.legal.cookies.s2.title: '2. Galetes estrictament necessàries'
demo.legal.cookies.s2.body: 'Imprescindibles per a la seguretat, l''enrutament i recordar el consentiment (p. ex. Cookie_Consent, indicadors per categoria). No requereixen consentiment i no es poden desactivar al modal.'
demo.legal.cookies.s3.title: '3. Galetes de funcionalitat i preferències'
demo.legal.cookies.s3.body: 'Les galetes de funcionalitat habiliten funcions millorades; les de preferències recorden idioma i opcions d''interfície. Base jurídica: consentiment. Durada màxima: 12 mesos. Només s''activen si habiliteu les categories «Funcionalitat» o «Preferències».'
demo.legal.cookies.s4.title: '4. Galetes d''analítica'
demo.legal.cookies.s4.body: 'Mesuren visites i navegació de forma agregada (marcadors de demo com _ga_demo). Base jurídica: consentiment. Tercers: només proveïdor d''analítica de demostració; no hi ha seguiment real en aquesta demo.'
demo.legal.cookies.s5.title: '5. Galetes de màrqueting'
demo.legal.cookies.s5.body: 'Usades per a publicitat i mesura de conversions (marcadors de demo com _fbp_demo). Base jurídica: consentiment. Tercers: només plataformes publicitàries de demostració.'
demo.legal.cookies.s6.title: '6. Gestió de galetes i inventari'
demo.legal.cookies.s6.body: 'Useu «Configuració de galetes» al peu o la navegació per canviar o retirar el consentiment. Els administradors poden mantenir la taula d''inventari de galetes per perfil de consentiment (nom, proveïdor, categoria, durada, tipus). També podeu eliminar galetes des del navegador. Rebutjar les no essencials no bloqueja l''accés a la demo.'
demo.legal.consent.title: 'Informació sobre el consentiment'
demo.legal.consent.s1.title: '1. Com obtenim el consentiment'
demo.legal.consent.s1.body: 'En la primera visita (o després d''una revisió de la política) una capa us demana acceptar totes les galetes, rebutjar les no essencials o personalitzar categories. Les galetes no essencials no s''instal·len fins que confirmeu l''elecció.'
demo.legal.consent.s2.title: '2. Eleccions granulars'
demo.legal.consent.s2.body: 'Podeu activar o desactivar funcionalitat, preferències, analítica i màrqueting de forma independent. Les galetes estrictament necessàries romanen actives perquè el lloc no pot funcionar sense elles.'
demo.legal.consent.s3.title: '3. Retirada del consentiment'
demo.legal.consent.s3.body: 'Obriu «Configuració de galetes» en qualsevol moment per actualitzar preferències. Si la neteja automàtica està activa, revocar una categoria elimina les galetes de demo associades al navegador.'
demo.legal.consent.s4.title: '4. Conseqüències del rebuig'
demo.legal.consent.s4.body: 'Si rebutgeu les galetes no essencials, les funcions opcionals (scripts d''analítica o màrqueting de demo) no s''executaran. La funcionalitat principal de la demo segueix disponible.'
demo.legal.consent.s5.title: '5. Prova del consentiment'
demo.legal.consent.s5.body: 'Amb el registre actiu, la demo emmagatzema IP anonimitzada, marca temporal, categories acceptades i revisió de la política a SQLite amb finalitats de responsabilitat proactiva. Descriviu aquest tractament a l''avís de privacitat en producció.'
