demo.legal.updated: 'Demo document — illustrative only, not legal advice. Last updated: June 2025.'
demo.legal.related: 'Related documents'
demo.legal.privacy.title: 'Privacy policy'
demo.legal.privacy.s1.title: '1. Data controller'
demo.legal.privacy.s1.body: 'This Symfony demo application (“Demo Cookie Consent”) is published for technical illustration. For production sites you must identify your organisation as data controller, including contact details and, where required, your Data Protection Officer.'
demo.legal.privacy.s2.title: '2. Personal data we process'
demo.legal.privacy.s2.body: 'In this demo we may process: anonymised IP addresses and consent choices stored in cookies; consent logs in a local SQLite database when logging is enabled; and technical logs from the web server. No real user accounts or payment data are collected.'
demo.legal.privacy.s3.title: '3. Purposes and legal bases'
demo.legal.privacy.s3.body: 'Strictly necessary processing (session, security, storing consent) relies on legitimate interest / necessity. Functionality, preference, analytics and marketing cookies are used only with your consent (Art. 6(1)(a) GDPR). Consent logs support accountability and audit (Art. 6(1)(f) GDPR, where applicable).'
demo.legal.privacy.s4.title: '4. Retention'
demo.legal.privacy.s4.body: 'Consent cookies are kept for up to 12 months unless you clear them sooner. Consent log rows should be purged according to your retention policy; in production define and document this period in your privacy notice.'
demo.legal.privacy.s5.title: '5. Your rights'
demo.legal.privacy.s5.body: 'You have the right to access, rectify, erase, restrict processing, object, and data portability where applicable. You may withdraw cookie consent at any time without affecting the lawfulness of processing based on consent before withdrawal. Contact the data controller to exercise your rights.'
demo.legal.privacy.s6.title: '6. More information'
demo.legal.privacy.s6.body: 'See our Cookie policy for a category-by-category description, including the cookie inventory table, and our Consent information page for how choices are collected and stored.'
demo.legal.cookies.title: 'Cookie policy'
demo.legal.cookies.s1.title: '1. What are cookies?'
demo.legal.cookies.s1.body: 'Cookies are small text files stored on your device. We also refer to similar technologies (local storage, pixels) as “cookies” in this policy.'
demo.legal.cookies.s2.title: '2. Strictly necessary cookies'
demo.legal.cookies.s2.body: 'Required for security, routing and remembering your consent (e.g. Cookie_Consent, category flags). These do not require consent and cannot be disabled in the modal.'
demo.legal.cookies.s3.title: '3. Functionality and preference cookies'
demo.legal.cookies.s3.body: 'Functionality cookies enable enhanced features; preference cookies remember language and interface choices. Legal basis: consent. Maximum duration: 12 months. Activated only if you enable the “Functionality” or “Preferences” categories.'
demo.legal.cookies.s4.title: '4. Analytics cookies'
demo.legal.cookies.s4.body: 'Measure visits and navigation in aggregate (demo placeholders such as _ga_demo). Legal basis: consent. Third parties: demonstration analytics provider only — no real tracking in this demo.'
demo.legal.cookies.s5.title: '5. Marketing cookies'
demo.legal.cookies.s5.body: 'Used for advertising and conversion measurement (demo placeholders such as _fbp_demo). Legal basis: consent. Third parties: demonstration ad platforms only.'
demo.legal.cookies.s6.title: '6. Managing cookies and inventory'
demo.legal.cookies.s6.body: 'Use “Cookie settings” in the footer or navigation to change or withdraw consent. Administrators can maintain the cookie inventory table per consent profile (name, provider, category, duration, type). You can also delete cookies via your browser. Refusing non-essential cookies does not block access to the demo.'
demo.legal.consent.title: 'Consent information'
demo.legal.consent.s1.title: '1. How we obtain consent'
demo.legal.consent.s1.body: 'On your first visit (or after a policy revision) a layer asks you to accept all cookies, reject non-essential cookies, or customise categories. Non-essential cookies are not set until you confirm your choice.'
demo.legal.consent.s2.title: '2. Granular choices'
demo.legal.consent.s2.body: 'You can enable or disable functionality, preferences, analytics and marketing categories independently. Strictly necessary cookies remain active because the site cannot function without them.'
demo.legal.consent.s3.title: '3. Withdrawing consent'
demo.legal.consent.s3.body: 'Open “Cookie settings” at any time to update preferences. When auto-clear is enabled, revoking a category removes associated demo cookies from your browser.'
demo.legal.consent.s4.title: '4. Consequences of refusal'
demo.legal.consent.s4.body: 'If you reject non-essential cookies, optional features (demo analytics or marketing scripts) will not run. Core demo functionality remains available.'
demo.legal.consent.s5.title: '5. Proof of consent'
demo.legal.consent.s5.body: 'When logging is enabled, the demo stores an anonymised IP, timestamp, categories accepted, and policy revision in SQLite for accountability. Describe this processing in your production privacy notice.'
