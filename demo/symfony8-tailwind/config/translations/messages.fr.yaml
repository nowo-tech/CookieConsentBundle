demo.legal.updated: 'Document de démonstration — à titre illustratif uniquement, sans valeur juridique. Dernière mise à jour : juin 2025.'
demo.legal.related: 'Documents connexes'
demo.legal.privacy.title: 'Politique de confidentialité'
demo.legal.privacy.s1.title: '1. Responsable du traitement'
demo.legal.privacy.s1.body: 'Cette application de démonstration Symfony (« Demo Cookie Consent ») est publiée à des fins techniques. En production, vous devez identifier votre organisation comme responsable du traitement, avec coordonnées et, le cas échéant, délégué à la protection des données.'
demo.legal.privacy.s2.title: '2. Données personnelles traitées'
demo.legal.privacy.s2.body: 'Dans cette démo, nous pouvons traiter : adresses IP anonymisées et choix de consentement stockés dans des cookies ; journaux de consentement SQLite lorsque l''enregistrement est activé ; journaux techniques du serveur web. Aucun compte utilisateur réel ni donnée de paiement n''est collecté.'
demo.legal.privacy.s3.title: '3. Finalités et bases juridiques'
demo.legal.privacy.s3.body: 'Le traitement strictement nécessaire (session, sécurité, mémorisation du consentement) repose sur l''intérêt légitime / la nécessité. Les cookies de fonctionnalité, préférences, analytique et marketing ne sont utilisés qu''avec votre consentement (art. 6.1.a RGPD). Les journaux de consentement soutiennent la responsabilité (art. 6.1.f RGPD, le cas échéant).'
demo.legal.privacy.s4.title: '4. Conservation'
demo.legal.privacy.s4.body: 'Les cookies de consentement sont conservés jusqu''à 12 mois sauf suppression anticipée. Les lignes du journal doivent être purgées selon votre politique de conservation ; en production, définissez et documentez cette durée dans votre notice de confidentialité.'
demo.legal.privacy.s5.title: '5. Vos droits'
demo.legal.privacy.s5.body: 'Vous disposez des droits d''accès, rectification, effacement, limitation, opposition et portabilité le cas échéant. Vous pouvez retirer votre consentement aux cookies à tout moment sans affecter la licéité du traitement fondé sur le consentement antérieur. Contactez le responsable pour exercer vos droits.'
demo.legal.privacy.s6.title: '6. Informations complémentaires'
demo.legal.privacy.s6.body: 'Consultez notre Politique de cookies pour une description par catégorie, y compris le tableau d''inventaire des cookies, et la page Informations sur le consentement pour savoir comment les choix sont collectés et stockés.'
demo.legal.cookies.title: 'Politique de cookies'
demo.legal.cookies.s1.title: '1. Que sont les cookies ?'
demo.legal.cookies.s1.body: 'Les cookies sont de petits fichiers texte stockés sur votre appareil. Nous incluons aussi des technologies similaires (stockage local, pixels) dans cette politique.'
demo.legal.cookies.s2.title: '2. Cookies strictement nécessaires'
demo.legal.cookies.s2.body: 'Indispensables pour la sécurité, le routage et mémoriser votre consentement (p. ex. Cookie_Consent, indicateurs de catégorie). Ils ne requièrent pas de consentement et ne peuvent pas être désactivés dans le modal.'
demo.legal.cookies.s3.title: '3. Cookies de fonctionnalité et de préférences'
demo.legal.cookies.s3.body: 'Les cookies de fonctionnalité activent des fonctions avancées ; ceux de préférences mémorisent la langue et les choix d''interface. Base juridique : consentement. Durée maximale : 12 mois. Activés uniquement si vous activez les catégories « Fonctionnalité » ou « Préférences ».'
demo.legal.cookies.s4.title: '4. Cookies analytiques'
demo.legal.cookies.s4.body: 'Mesurent les visites et la navigation de manière agrégée (marqueurs demo comme _ga_demo). Base juridique : consentement. Tiers : fournisseur analytique de démonstration uniquement — aucun suivi réel dans cette démo.'
demo.legal.cookies.s5.title: '5. Cookies marketing'
demo.legal.cookies.s5.body: 'Utilisés pour la publicité et la mesure de conversions (marqueurs demo comme _fbp_demo). Base juridique : consentement. Tiers : plateformes publicitaires de démonstration uniquement.'
demo.legal.cookies.s6.title: '6. Gestion des cookies et inventaire'
demo.legal.cookies.s6.body: 'Utilisez « Paramètres des cookies » dans le pied de page ou la navigation pour modifier ou retirer le consentement. Les administrateurs peuvent maintenir le tableau d''inventaire des cookies par profil de consentement (nom, fournisseur, catégorie, durée, type). Vous pouvez aussi supprimer les cookies via votre navigateur. Refuser les non essentiels ne bloque pas l''accès à la démo.'
demo.legal.consent.title: 'Informations sur le consentement'
demo.legal.consent.s1.title: '1. Comment nous obtenons le consentement'
demo.legal.consent.s1.body: 'Lors de votre première visite (ou après une révision de la politique), une couche vous demande d''accepter tous les cookies, de refuser les non essentiels ou de personnaliser les catégories. Les cookies non essentiels ne sont pas déposés tant que vous n''avez pas confirmé votre choix.'
demo.legal.consent.s2.title: '2. Choix granulaires'
demo.legal.consent.s2.body: 'Vous pouvez activer ou désactiver fonctionnalité, préférences, analytique et marketing indépendamment. Les cookies strictement nécessaires restent actifs car le site ne peut pas fonctionner sans eux.'
demo.legal.consent.s3.title: '3. Retrait du consentement'
demo.legal.consent.s3.body: 'Ouvrez « Paramètres des cookies » à tout moment pour mettre à jour vos préférences. Si la suppression automatique est activée, révoquer une catégorie supprime les cookies demo associés de votre navigateur.'
demo.legal.consent.s4.title: '4. Conséquences du refus'
demo.legal.consent.s4.body: 'Si vous refusez les cookies non essentiels, les fonctions optionnelles (scripts analytiques ou marketing demo) ne s''exécuteront pas. La fonctionnalité principale de la démo reste disponible.'
demo.legal.consent.s5.title: '5. Preuve du consentement'
demo.legal.consent.s5.body: 'Lorsque l''enregistrement est activé, la démo stocke une IP anonymisée, un horodatage, les catégories acceptées et la révision de la politique dans SQLite à des fins de responsabilité. Décrivez ce traitement dans votre notice de confidentialité en production.'
